<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly | Coming Soon</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Marcellus&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <link rel="stylesheet" href="css/loading.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/coming_soon.css">
</head>
<body>
  <div class="custom-cursor"></div>
  <div id="navbar-placeholder"></div>

  <section class="coming-soon-hero">
    <div class="coming-soon-bg"></div>
    <div class="coming-soon-overlay"></div>
    <div class="coming-soon-content">
      <h1 class="coming-soon-title">COMING<br>SOON</h1>
      
      <div class="decorative-line">
        <div class="line"></div>
        <div class="ornament">
          <i class="fas fa-layer-group"></i>
        </div>
        <div class="line"></div>
      </div>

      <div class="countdown-container">
        <div class="countdown-item">
          <div class="circle">00</div>
          <span>Hours</span>
        </div>
        <div class="countdown-item">
          <div class="circle">00</div>
          <span>Minutes</span>
        </div>
        <div class="countdown-item">
          <div class="circle">00</div>
          <span>Seconds</span>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/loading.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
