<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esports Pro Arena | Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Marcellus&family=Open+Sans:wght@300;400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="css/loading.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>
  <div class="custom-cursor"></div>

  <div class="login-split-container">
    <div class="login-left">
      <div class="left-overlay"></div>
      <div class="left-content">
        <h1 class="logo-text">STACKLY</h1>
        <h2>Welcome back!</h2>
        <p>Access your dashboard and manage your agricultural journey</p>
        <a href="index.html" class="btn-back-home">BACK TO HOME</a>
      </div>
    </div>
    
    <div class="login-right">
      <div class="right-content">
        <div class="login-header">
          <h2>Login to your account</h2>
          <p>Don't have an account? <a href="register.html">Sign Up</a></p>
        </div>
        
        <form class="new-login-form" onsubmit="event.preventDefault(); const role = document.getElementById('role-select').value; const email = document.getElementById('login-email').value; localStorage.setItem('userEmail', email); if(role === 'Admin') { window.location.href='admin_dashboard.html'; } else { window.location.href='user_dashboard.html'; }">
          <div class="form-group">
            <label>Login as</label>
            <select id="role-select">
              <option value="Admin">Admin</option>
              <option value="User">User</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="Enter Your Email" required>
          </div>
          
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
          </div>
          
          <div class="form-options">
            <label class="remember-me-new">
              <input type="checkbox"> Remember me
            </label>
            <a href="404.html" class="forgot-link">Forgot password?</a>
          </div>
          
          <button type="submit" class="btn-login-new">LOGIN</button>
          
          <div class="divider">
            <span>Or create with</span>
          </div>
          
          <div class="social-login">
            <button type="button" class="btn-social" onclick="window.location.href='404.html'">Facebook</button>
            <button type="button" class="btn-social" onclick="window.location.href='404.html'">Google</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/loading.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
