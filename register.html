<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esports Pro Arena | Register</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Marcellus&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <link rel="stylesheet" href="css/loading.css">  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="custom-cursor"></div>

  <div class="login-split-container">
    <div class="login-left">
      <div class="left-overlay"></div>
      <div class="left-content">
        <h1 class="logo-text">STACKLY</h1>
        <h2>Join us today!</h2>
        <p>Create an account to start managing your agricultural journey</p>
        <a href="index.html" class="btn-back-home">BACK TO HOME</a>
      </div>
    </div>
    
    <div class="login-right">
      <div class="right-content">
        <div class="login-header">
          <h2>Create an account</h2>
          <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
        
        <form class="new-login-form" onsubmit="event.preventDefault(); alert('Registration Successful!');">
          <div class="form-group">
            <label>Register as</label>
            <select>
              <option>User</option>
              <option>Admin</option>
            </select>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="First Name" required>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Last Name" required>
            </div>
          </div>
          
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter Your Email" required>
          </div>
          
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create a Password" required>
          </div>
          
          <div class="form-options">
            <label class="remember-me-new" style="font-size: 0.85rem;">
              <input type="checkbox" required> I agree to the <a href="#" class="forgot-link" style="margin-left: 3px;">Terms of Service</a> <span style="margin: 0 3px;">and</span> <a href="#" class="forgot-link">Privacy Policy</a>.
            </label>
          </div>
          
          <button type="submit" class="btn-login-new">CREATE ACCOUNT</button>
          
          <div class="divider">
            <span>Or register with</span>
          </div>
          
          <div class="social-login">
            <button type="button" class="btn-social">Facebook</button>
            <button type="button" class="btn-social">Google</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/loading.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
